


services:
  kafka:
    image: apache/kafka:latest
    environment:
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "2181:2181"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
      
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: eventdb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"

  api-server:
    build:
      context: ../api-server
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - postgres
      - mysql
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    depends_on:
      - kafka
      - postgres
      - mysql
      

volumes:
  postgres-data:
  mysql-data:

