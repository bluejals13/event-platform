


services:
  api-server:
    build: ./api-server
    ports:
      - "8080:8080"
    depends_on:
      - kafka
      - postgres

  worker:
    build: ./worker
    depends_on:
      - kafka
      - postgres

  kafka:
    image: apache/kafka:latest   # 로컬에 있음
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_LISTENERS=PLAINTEXT://:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper

  zookeeper:
    image: zookeeper:latest   # 로컬에 있음
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
      
  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: eventdb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"

  api-server:
    build: ../api-server
    depends_on:
      - kafka
      - postgres
      - mysql
    ports:
      - "8080:8080"

  worker:
    build: ../worker
    depends_on:
      - kafka
      - postgres
      - mysql
      

volumes:
  postgres-data:
  mysql-data:

