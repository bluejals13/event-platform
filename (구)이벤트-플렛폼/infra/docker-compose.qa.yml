

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  mysql:
    image: mysql:8
    environment:
      MYSQL_DATABASE: eventdb
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"

  api-server:
    build: ../api-server
    depends_on:
      - kafka
      - postgres
      - mysql
    ports:
      - "8080:8080"

  worker:
    build: ../worker
    depends_on:
      - kafka
      - postgres
      - mysql
      

volumes:
  postgres-data:
  mysql-data:

